<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Юля, поздравляю! 🎓</title>

    <!-- Подключаем шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        /* ----- ОБНУЛЕНИЕ И БАЗА ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fcf6f0 0%, #f5ede6 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .card {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 48px 36px 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08), 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: 0.3s ease;
        }

        /* ----- ХЕДЕР С ЦВЕТОЧКАМИ ----- */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 36px;
            flex-wrap: wrap;
        }

        .flower {
            font-size: 42px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            user-select: none;
            line-height: 1;
        }

        .flower:nth-child(1) {
            animation-delay: 0s;
        }
        .flower:nth-child(3) {
            animation-delay: 1.5s;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-14px) rotate(6deg);
            }
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-style: italic;
            font-size: 40px;
            color: #2d1f14;
            letter-spacing: -0.01em;
            text-align: center;
            line-height: 1.2;
            background: linear-gradient(135deg, #8b3f2a, #c76b4a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title span {
            display: inline-block;
        }

        /* ----- ВИДЕО (АДАПТИВ) ----- */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            /* 16:9 */
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 36px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.10);
            background: #0000000d;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #f0e8e0;
        }

        /* ----- QR-КОД И ПОДПИСЬ ----- */
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin: 16px 0 28px;
        }

        .qr-code {
            width: 140px;
            height: 140px;
            background: #ffffff;
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: 0.25s ease;
        }

        .qr-code:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.10);
        }

        .qr-code img {
            width: 100%;
            height: 100%;
            display: block;
        }

        .qr-label {
            font-size: 14px;
            color: #7a6a5e;
            font-weight: 400;
            letter-spacing: 0.02em;
            background: rgba(255, 255, 255, 0.5);
            padding: 6px 18px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* ----- ФУТЕР С ДАТОЙ ----- */
        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding-top: 18px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .footer-year {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 18px;
            color: #b8a69a;
            letter-spacing: 0.04em;
            background: rgba(255, 255, 255, 0.4);
            padding: 6px 22px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
        }

        .footer-year span {
            font-weight: 700;
        }

        /* ----- АДАПТИВ (МОБИЛКИ) ----- */
        @media (max-width: 600px) {
            .card {
                padding: 28px 16px 24px;
                border-radius: 32px;
            }

            .title {
                font-size: 28px;
            }

            .flower {
                font-size: 30px;
            }

            .header {
                gap: 10px;
            }

            .qr-code {
                width: 110px;
                height: 110px;
                padding: 10px;
            }

            .footer-year {
                font-size: 15px;
                padding: 4px 16px;
            }
        }

        @media (max-width: 420px) {
            .title {
                font-size: 22px;
            }
            .flower {
                font-size: 24px;
            }
            .header {
                gap: 6px;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <!-- ХЕДЕР: Цветочки + Заголовок -->
        <div class="header">
            <span class="flower">🌸</span>
            <h1 class="title">Юля, поздравляю!</h1>
            <span class="flower">🌷</span>
        </div>

        <!-- ВИДЕО -->
        <div class="video-wrapper">
            <video controls playsinline preload="metadata" poster="">
                <!-- замени src на свой файл или ссылку -->
                <source src="your-video.mp4" type="video/mp4" />
                Твой браузер не поддерживает видео :(
            </video>
        </div>

        <!-- QR-КОД -->
        <div class="qr-section">
            <div class="qr-code">
                <!-- замени src на свой QR-код -->
                <img src="qr-code.png" alt="QR-код на этот сайт" />
            </div>
            <span class="qr-label">📱 отсканируй — откроется сайт</span>
        </div>

        <!-- ФУТЕР: 2026 -->
        <div class="footer">
            <div class="footer-year"><span>✦</span> 2026 <span>✦</span></div>
        </div>

    </div>

</body>
</html>
