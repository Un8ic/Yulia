<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Юля, поздравляю! 🎓</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>

    <style>
        /* ----- ОБЩИЕ СТИЛИ (без изменений) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fcf6f0 0%, #f5ede6 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px 12px;
        }

        .card {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 32px 20px 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08), 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .flower {
            font-size: 34px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
            user-select: none;
            line-height: 1;
        }
        .flower:nth-child(1) { animation-delay: 0s; }
        .flower:nth-child(3) { animation-delay: 1.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(6deg); }
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-style: italic;
            font-size: 32px;
            letter-spacing: -0.01em;
            text-align: center;
            line-height: 1.2;
            background: linear-gradient(135deg, #8b3f2a, #c76b4a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ----- НОВЫЙ БЛОК ДЛЯ ВИДЕО (КНОПКА) ----- */
        .video-button-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 28px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.10);
            background: #0d0d0d;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .video-button-wrapper:active {
            transform: scale(0.98);
        }

        .video-button {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d0d0d;
            color: white;
            font-family: 'Inter', sans-serif;
            gap: 16px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
        }

        .video-button .icon {
            font-size: 64px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .video-button .main-text {
            font-size: 20px;
            font-weight: 500;
        }

        .video-button .sub-text {
            font-size: 14px;
            opacity: 0.6;
            max-width: 300px;
            line-height: 1.4;
        }

        .video-button .arrow {
            font-size: 24px;
            opacity: 0.8;
            margin-top: 4px;
        }

        /* СТИЛИ ДЛЯ QR-КОДА И ФУТЕРА (без изменений) */
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 12px 0 20px;
        }

        .qr-code {
            width: 130px;
            height: 130px;
            background: #ffffff;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-code canvas,
        .qr-code img {
            width: 100% !important;
            height: 100% !important;
            display: block;
            border-radius: 8px;
        }

        .qr-label {
            font-size: 13px;
            color: #7a6a5e;
            font-weight: 400;
            letter-spacing: 0.02em;
            background: rgba(255, 255, 255, 0.5);
            padding: 4px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .footer-year {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 16px;
            color: #b8a69a;
            letter-spacing: 0.04em;
            background: rgba(255, 255, 255, 0.4);
            padding: 4px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
        }
        .footer-year span { font-weight: 700; }

        /* СТРАНИЦА ВХОДА (без изменений) */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 10px 10px;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-style: italic;
            font-size: 28px;
            color: #2d1f14;
            text-align: center;
            line-height: 1.3;
        }
        .login-title .highlight {
            background: linear-gradient(135deg, #8b3f2a, #c76b4a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            font-size: 15px;
            color: #7a6a5e;
            text-align: center;
            opacity: 0.8;
        }

        .login-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 320px;
        }

        .login-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e8ddd6;
            border-radius: 40px;
            font-size: 18px;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            transition: 0.3s ease;
            text-align: center;
            outline: none;
            color: #2d1f14;
            -webkit-appearance: none;
        }
        .login-input:focus {
            border-color: #c76b4a;
            box-shadow: 0 0 0 4px rgba(199, 107, 74, 0.15);
        }
        .login-input::placeholder {
            color: #b8a69a;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #8b3f2a, #c76b4a);
            color: #ffffff;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 4px 16px rgba(199, 107, 74, 0.3);
            -webkit-tap-highlight-color: transparent;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(199, 107, 74, 0.4);
        }
        .login-btn:active {
            transform: scale(0.97);
        }

        .login-error {
            font-size: 14px;
            color: #d9534f;
            opacity: 0;
            transition: 0.3s ease;
            min-height: 20px;
            text-align: center;
        }
        .login-error.show { opacity: 1; }

        .main-content {
            display: none;
        }
        .main-content.active {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-flowers {
            display: flex;
            gap: 14px;
            font-size: 30px;
            animation: float 3s ease-in-out infinite;
        }
        .login-flowers .flower-icon { animation: none; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 600px) {
            .card {
                padding: 20px 14px 18px;
                border-radius: 32px;
            }
            .title {
                font-size: 26px;
            }
            .flower {
                font-size: 26px;
            }
            .header {
                gap: 8px;
                margin-bottom: 20px;
            }
            .video-button-wrapper {
                border-radius: 18px;
                margin-bottom: 20px;
            }
            .video-button .icon {
                font-size: 48px;
            }
            .video-button .main-text {
                font-size: 18px;
            }
            .qr-code {
                width: 110px;
                height: 110px;
                padding: 8px;
            }
            .footer-year {
                font-size: 14px;
                padding: 4px 14px;
            }
            .login-title {
                font-size: 24px;
            }
            .login-input {
                font-size: 16px;
                padding: 14px 18px;
            }
            .login-btn {
                font-size: 16px;
                padding: 14px 18px;
            }
            .login-screen {
                gap: 16px;
            }
        }

        @media (max-width: 400px) {
            .card {
                padding: 16px 10px 14px;
                border-radius: 24px;
            }
            .title {
                font-size: 20px;
            }
            .flower {
                font-size: 20px;
            }
            .header {
                gap: 6px;
                margin-bottom: 16px;
            }
            .video-button .icon {
                font-size: 38px;
            }
            .video-button .main-text {
                font-size: 16px;
            }
            .qr-code {
                width: 90px;
                height: 90px;
                padding: 6px;
            }
            .login-title {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="card" id="app">

        <!-- СТРАНИЦА ВХОДА -->
        <div class="login-screen" id="loginScreen">
            <div class="login-flowers">
                <span class="flower-icon">🌸</span>
                <span class="flower-icon">🌷</span>
                <span class="flower-icon">🌹</span>
            </div>
            <div class="login-title">
                Добро пожаловать ✨<br />
                <span class="highlight">Введи пароль</span>
            </div>
            <div class="login-subtitle">
                Этот сайт создан специально для тебя
            </div>
            <div class="login-box">
                <input type="password" class="login-input" id="passwordInput" placeholder="Введи пароль" autofocus />
                <button class="login-btn" id="loginBtn">Войти 🌸</button>
                <div class="login-error" id="loginError">❌ Неверный пароль, попробуй ещё раз</div>
            </div>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div class="main-content" id="mainContent">

            <div class="header">
                <span class="flower">🌸</span>
                <h1 class="title">Юля, поздравляю!</h1>
                <span class="flower">🌷</span>
            </div>

            <!-- ВИДЕО-КНОПКА (ОТКРЫВАЕТСЯ В НОВОЙ ВКЛАДКЕ) -->
            <a href="https://drive.google.com/file/d/13H2IvVxNzyAf8LVtWldT6-Xflt1Rry_e/view?usp=drivesdk" target="_blank" class="video-button-wrapper">
                <div class="video-button">
                    <div class="icon">▶️</div>
                    <div class="main-text">Нажми, чтобы посмотреть видео</div>
                    <div class="sub-text">Откроется в новой вкладке Google Диска</div>
                    <div class="arrow">⬇️</div>
                </div>
            </a>

            <!-- QR-КОД -->
            <div class="qr-section">
                <div class="qr-code" id="qrcode"></div>
                <span class="qr-label">📱 отсканируй — откроется сайт</span>
            </div>

            <div class="footer">
                <div class="footer-year"><span>✦</span> 2026 <span>✦</span></div>
            </div>

        </div>

    </div>

    <script>
        // ----- ЛОГИКА ВХОДА (ПАРОЛЬ: 319) -----
        (function() {
            const passwordInput = document.getElementById('passwordInput');
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            const loginScreen = document.getElementById('loginScreen');
            const mainContent = document.getElementById('mainContent');
            const CORRECT_PASSWORD = '319';

            function tryLogin() {
                const entered = passwordInput.value.trim();
                if (entered === CORRECT_PASSWORD) {
                    loginScreen.style.display = 'none';
                    mainContent.classList.add('active');
                    loginError.classList.remove('show');
                    sessionStorage.setItem('vogue_authenticated', 'true');
                    generateQR();
                } else {
                    loginError.classList.add('show');
                    passwordInput.value = '';
                    passwordInput.focus();
                    setTimeout(() => loginError.classList.remove('show'), 2500);
                }
            }

            loginBtn.addEventListener('click', tryLogin);
            passwordInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault();
                    tryLogin(); }
            });

            if (sessionStorage.getItem('vogue_authenticated') === 'true') {
                loginScreen.style.display = 'none';
                mainContent.classList.add('active');
                setTimeout(generateQR, 100);
            }
            if (loginScreen.style.display !== 'none') passwordInput.focus();
        })();

        // ----- ГЕНЕРАЦИЯ QR-КОДА -----
        function generateQR() {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            const url = window.location.href;
            try {
                new QRCode(qrContainer, {
                    text: url,
                    width: 120,
                    height: 120,
                    colorDark: '#2d1f14',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
            } catch(e) {
                console.warn('QR generation error:', e);
            }
        }
    </script>

</body>
</html>
